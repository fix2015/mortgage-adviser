# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mortgage-advisor.probooking.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://mortgage-advisor.probooking.app$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mortgage-advisor.probooking.app;

    ssl_certificate     /etc/letsencrypt/live/mortgage-advisor.probooking.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mortgage-advisor.probooking.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow larger uploads (mortgage documents)
    client_max_body_size 50m;

    # API -> backend container (port 8002)
    location /api/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # Everything else -> frontend container (port 3003)
    location / {
        proxy_pass         http://127.0.0.1:3003;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
