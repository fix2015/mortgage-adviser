name: ai-mortgage-adviser

services:
  postgres:
    image: postgres:16-alpine
    container_name: mortgage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mortgage_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mortgage_db}
    volumes:
      - mortgage_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mortgage_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mortgage_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - mortgage_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/fix2015/mortgage-adviser/backend:latest
    container_name: mortgage_backend
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mortgage_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mortgage_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "127.0.0.1:8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2 --proxy-headers --forwarded-allow-ips='*'

  celery_worker:
    image: ghcr.io/fix2015/mortgage-adviser/backend:latest
    container_name: mortgage_celery_worker
    restart: unless-stopped
    env_file:
      - backend.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mortgage_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mortgage_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2

  frontend:
    image: ghcr.io/fix2015/mortgage-adviser/frontend:latest
    container_name: mortgage_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"
    depends_on:
      - backend

volumes:
  mortgage_postgres_data:
    external: true
  mortgage_redis_data:
    external: true

networks:
  default:
    name: mortgage_network
