name: Deploy to AWS EC2

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decode .env files
        run: |
          echo "${{ secrets.MORTGAGE_BACKEND_ENV }}" | base64 -d > backend/.env
          echo "${{ secrets.MORTGAGE_INFRA_ENV }}"   | base64 -d > infra/.env

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" | base64 -d > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem

      - name: Pull latest code on EC2
        run: |
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            APP_DIR="/opt/mortgage-adviser"
            if [ ! -d "$APP_DIR/.git" ]; then
              sudo git clone https://github.com/fix2015/mortgage-adviser.git "$APP_DIR"
              sudo chown -R $USER:$USER "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin main && git reset --hard origin/main
            fi
          EOF

      - name: Copy .env files to EC2
        run: |
          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            backend/.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/mortgage-adviser/infra/backend.env

          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            infra/.env \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/mortgage-adviser/infra/.env

      - name: Ensure Docker is installed on EC2
        run: |
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
                | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
                | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
              sudo usermod -aG docker $USER
            fi
            docker --version
            docker compose version
          EOF

      - name: Deploy with Docker Compose
        timeout-minutes: 15
        run: |
          GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            set -e
            cd /opt/mortgage-adviser/infra

            # Create external volumes if needed
            sudo docker volume create mortgage_postgres_data 2>/dev/null || true
            sudo docker volume create mortgage_redis_data 2>/dev/null || true

            # Login to GHCR
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u fix2015 --password-stdin

            # Stop old containers
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans || true

            # Pull latest images
            sudo docker compose -f docker-compose.prod.yml pull

            # Clean dangling images
            sudo docker image prune -f || true

            # Start all services
            sudo docker compose -f docker-compose.prod.yml up -d

            # Run database migrations
            sudo docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head || true

            # Show running containers
            sudo docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Health check
        run: |
          ssh -i /tmp/deploy_key.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "=== Waiting for backend API ==="
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8002/api/v1/health > /dev/null 2>&1; then
                echo "Backend API is up!"
                curl -s http://localhost:8002/api/v1/health
                break
              fi
              if [ "$i" = "24" ]; then
                echo "ERROR: backend did not become ready in time"
                cd /opt/mortgage-adviser/infra
                sudo docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              echo "[$i/24] Waiting..."
              sleep 5
            done
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy_key.pem
